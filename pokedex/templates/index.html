<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Pokédex</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>

    <div class="container mt-4">

        <div class="bg-primary text-white p-4 text-center rounded shadow">
            <h1>Mi Pokédex</h1>
        </div>

        <p class="p-3 text-center">
            ¡Bienvenido a mi Pokédex! Aquí encontrarás información de algunos Pokémon.
        </p>

    <div class="list-group">
        {% for pokemon in pokemons %}
            <a href="{% url 'pokemon_details' pokemon %}" class="list-group-item list-group-item-action">
                {{ pokemon }}
            </a>
        {% endfor %}
    </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</body>
</html>
